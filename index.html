<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas Restaurante</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d; --surface: #161616; --surface2: #1e1e1e;
    --border: #2a2a2a; --gold: #c9a84c; --gold-light: #e8c96e;
    --green: #4caf76; --red: #e05252; --text: #f0ece0;
    --muted: #888; --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #0d0d0d 0%, #1a1408 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 10px;
  }
  header h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); letter-spacing: 1px; }
  .header-right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  #syncStatus { display: flex; align-items: center; gap: 6px; font-size: 0.74rem; color: var(--muted); font-family: 'DM Mono', monospace; }
  #syncDot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); display: inline-block; transition: background 0.3s; }

  .container { max-width: 1200px; margin: 0 auto; padding: 26px 20px; }

  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 26px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 22px; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .card.income::before  { background: var(--green); }
  .card.expense::before { background: var(--red); }
  .card.balance::before { background: var(--gold); }
  .card label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; font-family: 'DM Mono', monospace; }
  .card .amount { font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 700; margin-top: 5px; }
  .card.income .amount  { color: var(--green); }
  .card.expense .amount { color: var(--red); }
  .card.balance .amount { color: var(--gold); }
  .card .period-note { font-size: 0.7rem; color: var(--muted); margin-top: 3px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface); border-radius: var(--radius); padding: 5px; border: 1px solid var(--border); width: fit-content; flex-wrap: wrap; }
  .tab { padding: 8px 16px; border: none; background: transparent; color: var(--muted); cursor: pointer; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.83rem; transition: all 0.2s; }
  .tab.active { background: var(--gold); color: #0d0d0d; font-weight: 600; }

  .panel   { display: none; }
  .panel.active  { display: block; }
  .subpanel      { display: none; }
  .subpanel.active { display: block; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 12px; align-items: end; background: var(--surface); padding: 22px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 18px; }
  .field label { display: block; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; font-family: 'DM Mono', monospace; }
  .field input, .field select { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.87rem; outline: none; transition: border-color 0.2s; }
  .field input:focus, .field select:focus { border-color: var(--gold); }
  .field select option { background: #1e1e1e; }

  .btn { padding: 9px 20px; border: none; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.87rem; transition: all 0.2s; white-space: nowrap; }
  .btn-gold { background: var(--gold); color: #0d0d0d; }
  .btn-gold:hover { background: var(--gold-light); transform: translateY(-1px); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
  .btn-danger { background: transparent; border: none; color: var(--red); padding: 4px 8px; font-size: 0.78rem; cursor: pointer; border-radius: 4px; }
  .btn-danger:hover { background: rgba(224,82,82,0.1); }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .table-header h3 { font-family: 'DM Mono', monospace; font-size: 0.77rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 11px 18px; text-align: left; font-size: 0.69rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; font-family: 'DM Mono', monospace; border-bottom: 1px solid var(--border); background: var(--surface2); }
  td { padding: 12px 18px; font-size: 0.85rem; border-bottom: 1px solid #1a1a1a; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(201,168,76,0.03); }

  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 0.69rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .badge-income  { background: rgba(76,175,118,0.15); color: var(--green); }
  .badge-expense { background: rgba(224,82,82,0.15); color: var(--red); }
  .amount-cell    { font-family: 'DM Mono', monospace; font-weight: 500; }
  .amount-income  { color: var(--green); }
  .amount-expense { color: var(--red); }

  .filter-bar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-bar input, .filter-bar select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.83rem; outline: none; }

  .report-controls { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; background: var(--surface); padding: 20px 22px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 20px; }
  .report-controls select, .report-controls input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; outline: none; }
  .report-result { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 26px; }
  .report-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); margin-bottom: 4px; }
  .report-subtitle { font-size: 0.77rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 20px; }
  .report-totals { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 22px; }
  .report-total-card { background: var(--surface2); border-radius: 10px; padding: 14px 18px; }
  .report-total-card label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; font-family: 'DM Mono', monospace; }
  .report-total-card .val { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-top: 4px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
  .category-breakdown h4 { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; font-family: 'DM Mono', monospace; margin-bottom: 12px; }
  .cat-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #1a1a1a; font-size: 0.84rem; }
  .cat-bar-wrap { flex: 1; margin: 0 14px; height: 4px; background: var(--border); border-radius: 4px; }
  .cat-bar { height: 100%; border-radius: 4px; }

  .empty-state { text-align: center; padding: 44px; color: var(--muted); font-size: 0.87rem; }
  .empty-state .icon { font-size: 2.3rem; margin-bottom: 10px; }

  .prov-summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 8px; }
  .prov-summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; position: relative; overflow: hidden; }
  .prov-summary-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--red); }
  .prov-summary-card.al-dia::before { background: var(--green); }
  .prov-summary-card .pname { font-weight: 600; font-size: 0.92rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .prov-summary-card .pdebt { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--red); }
  .prov-summary-card.al-dia .pdebt { color: var(--green); }
  .prov-summary-card .pnotes { font-size: 0.69rem; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; }
  .dot-pendiente { background: var(--red); }
  .dot-parcial   { background: var(--gold); }
  .dot-pagado    { background: var(--green); }

  @media (max-width: 768px) {
    .summary { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr 1fr; }
    .report-totals { grid-template-columns: 1fr; }
    header h1 { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<header>
  <h1>&#127374; Finanzas Restaurante</h1>
  <div class="header-right">
    <div id="syncStatus">
      <span id="syncDot"></span>
      <span id="syncText">Conectando...</span>
    </div>
    <button class="btn btn-outline" style="padding:6px 14px;font-size:0.77rem" onclick="syncNow()">&#9729; Sincronizar</button>
    <span id="currentDate" style="font-size:0.73rem;color:var(--muted);font-family:'DM Mono',monospace"></span>
  </div>
</header>

<div class="container">

  <div class="summary">
    <div class="card income">
      <label>Ingresos (mes actual)</label>
      <div class="amount" id="sumIncome">$0.00</div>
      <div class="period-note" id="sumIncomePeriod"></div>
    </div>
    <div class="card expense">
      <label>Egresos (mes actual)</label>
      <div class="amount" id="sumExpense">$0.00</div>
      <div class="period-note" id="sumExpensePeriod"></div>
    </div>
    <div class="card balance">
      <label>Balance (mes actual)</label>
      <div class="amount" id="sumBalance">$0.00</div>
      <div class="period-note">Ingresos menos Egresos</div>
    </div>
  </div>

  <div class="tabs" id="mainTabs">
    <button class="tab active" onclick="switchTab(event,'registro')">&#128221; Registrar</button>
    <button class="tab" onclick="switchTab(event,'movimientos')">&#128203; Movimientos</button>
    <button class="tab" onclick="switchTab(event,'proveedores')">&#127978; Proveedores</button>
    <button class="tab" onclick="switchTab(event,'reportes')">&#128202; Reportes</button>
  </div>

  <!-- REGISTRAR -->
  <div class="panel active" id="tab-registro">
    <div class="form-grid">
      <div class="field">
        <label>Tipo</label>
        <select id="fType">
          <option value="income">Ingreso</option>
          <option value="expense">Egreso</option>
        </select>
      </div>
      <div class="field">
        <label>Fecha</label>
        <input type="date" id="fDate">
      </div>
      <div class="field">
        <label>Categoria</label>
        <select id="fCategory">
          <option value="">-- Selecciona --</option>
          <optgroup label="Ingresos">
            <option value="Ventas en mesa">Ventas en mesa</option>
            <option value="Ventas para llevar">Ventas para llevar</option>
            <option value="Delivery">Delivery</option>
            <option value="Eventos">Eventos</option>
            <option value="Bar/Bebidas">Bar / Bebidas</option>
            <option value="Otros ingresos">Otros ingresos</option>
          </optgroup>
          <optgroup label="Egresos">
            <option value="Insumos/Alimentos">Insumos / Alimentos</option>
            <option value="Bebidas">Bebidas</option>
            <option value="Nomina">Nomina</option>
            <option value="Renta">Renta</option>
            <option value="Servicios">Servicios</option>
            <option value="Mantenimiento">Mantenimiento</option>
            <option value="Marketing">Marketing</option>
            <option value="Impuestos">Impuestos</option>
            <option value="Otros egresos">Otros egresos</option>
          </optgroup>
        </select>
      </div>
      <div class="field">
        <label>Monto ($)</label>
        <input type="number" id="fAmount" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="field">
        <label>Descripcion</label>
        <input type="text" id="fDesc" placeholder="Nota opcional...">
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:20px">
      <button class="btn btn-gold" onclick="addTransaction()">+ Agregar Movimiento</button>
      <button class="btn btn-outline" onclick="clearForm()">Limpiar</button>
    </div>
    <div class="table-wrap">
      <div class="table-header"><h3>Ultimos movimientos</h3></div>
      <div id="recentTable"></div>
    </div>
  </div>

  <!-- MOVIMIENTOS -->
  <div class="panel" id="tab-movimientos">
    <div class="filter-bar">
      <input type="month" id="filterMonth">
      <select id="filterType">
        <option value="">Todos</option>
        <option value="income">Ingresos</option>
        <option value="expense">Egresos</option>
      </select>
      <select id="filterCategory"><option value="">Todas las categorias</option></select>
      <button class="btn btn-outline" onclick="applyFilters()">Filtrar</button>
      <button class="btn btn-outline" onclick="clearFilters()">Limpiar</button>
    </div>
    <div class="table-wrap">
      <div class="table-header">
        <h3>Todos los movimientos</h3>
        <span id="movCount" style="font-size:0.77rem;color:var(--muted)"></span>
      </div>
      <div id="movTable"></div>
    </div>
  </div>

  <!-- PROVEEDORES -->
  <div class="panel" id="tab-proveedores">
    <div class="tabs" id="provTabs" style="margin-bottom:18px">
      <button class="tab active" onclick="switchSubTab(event,'cuentas')">Cuentas por Pagar</button>
      <button class="tab" onclick="switchSubTab(event,'notas')">Registrar Nota</button>
      <button class="tab" onclick="switchSubTab(event,'pagos')">Registrar Pago</button>
      <button class="tab" onclick="switchSubTab(event,'provlist')">Mis Proveedores</button>
    </div>

    <div class="subpanel active" id="subpanel-cuentas">
      <div style="display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;align-items:flex-end">
        <div class="field" style="min-width:180px">
          <label>Proveedor</label>
          <select id="filterProvCuenta" onchange="renderCuentas()"><option value="">Todos</option></select>
        </div>
        <div class="field">
          <label>Estado</label>
          <select id="filterEstado" onchange="renderCuentas()">
            <option value="">Todos</option>
            <option value="pendiente">Pendiente</option>
            <option value="parcial">Parcial</option>
            <option value="pagado">Pagado</option>
          </select>
        </div>
      </div>
      <div id="resumenDeuda" style="margin-bottom:16px"></div>
      <div class="table-wrap">
        <div class="table-header">
          <h3>Notas de credito</h3>
          <span id="cuentasCount" style="font-size:0.77rem;color:var(--muted)"></span>
        </div>
        <div id="tablaCuentas"></div>
      </div>
    </div>

    <div class="subpanel" id="subpanel-notas">
      <div class="form-grid" style="grid-template-columns:1fr 1fr 1fr">
        <div class="field">
          <label>Proveedor existente</label>
          <select id="nProv"><option value="">-- Selecciona --</option></select>
        </div>
        <div class="field">
          <label>O escribe nuevo proveedor</label>
          <input type="text" id="nProvNuevo" placeholder="Nombre del proveedor">
        </div>
        <div class="field">
          <label>Fecha de la nota</label>
          <input type="date" id="nFecha">
        </div>
        <div class="field">
          <label>Folio / # Nota</label>
          <input type="text" id="nFolio" placeholder="Ej. NC-001">
        </div>
        <div class="field">
          <label>Monto total ($)</label>
          <input type="number" id="nMonto" placeholder="0.00" min="0" step="0.01">
        </div>
        <div class="field">
          <label>Fecha vencimiento (opcional)</label>
          <input type="date" id="nVence">
        </div>
        <div class="field" style="grid-column:1/-1">
          <label>Concepto / Descripcion</label>
          <input type="text" id="nConcepto" placeholder="Ej. Compra de insumos, carnes, verduras...">
        </div>
      </div>
      <button class="btn btn-gold" onclick="addNota()">+ Registrar Nota de Credito</button>
    </div>

    <div class="subpanel" id="subpanel-pagos">
      <div class="form-grid" style="grid-template-columns:1fr 1fr 1fr 1fr">
        <div class="field">
          <label>Proveedor</label>
          <select id="pProv" onchange="loadNotasPendientes()"><option value="">-- Selecciona --</option></select>
        </div>
        <div class="field">
          <label>Nota a pagar</label>
          <select id="pNota"><option value="">-- Elige proveedor --</option></select>
        </div>
        <div class="field">
          <label>Fecha de pago</label>
          <input type="date" id="pFecha">
        </div>
        <div class="field">
          <label>Monto pagado ($)</label>
          <input type="number" id="pMonto" placeholder="0.00" min="0" step="0.01">
        </div>
        <div class="field" style="grid-column:1/-1">
          <label>Referencia / Forma de pago</label>
          <input type="text" id="pRef" placeholder="Ej. Transferencia, efectivo, cheque #123...">
        </div>
      </div>
      <button class="btn btn-gold" onclick="addPago()">Registrar Pago</button>
    </div>

    <div class="subpanel" id="subpanel-provlist">
      <div id="listaProveedores"></div>
    </div>
  </div>

  <!-- REPORTES -->
  <div class="panel" id="tab-reportes">
    <div class="report-controls">
      <div class="field" style="display:flex;flex-direction:column">
        <label style="font-size:0.69rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px;font-family:'DM Mono',monospace">Periodo</label>
        <select id="rPeriod" onchange="updateReportInputs()">
          <option value="weekly">Semanal</option>
          <option value="biweekly">Quincenal</option>
          <option value="monthly" selected>Mensual</option>
          <option value="quarterly">Trimestral</option>
          <option value="semiannual">Semestral</option>
          <option value="annual">Anual</option>
        </select>
      </div>
      <div id="reportDateInputs" style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap"></div>
      <button class="btn btn-gold" onclick="generateReport()">Generar Reporte</button>
      <button class="btn btn-outline" onclick="exportReport()">Exportar CSV</button>
    </div>
    <div id="reportResult">
      <div class="empty-state"><div class="icon">&#128202;</div><div>Selecciona un periodo y genera tu reporte</div></div>
    </div>
  </div>

</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzInnkRFDkQyGkacFdlZnn7ZNmHY0Ist7CNfQOAiv8bTjzfoBFYaiqY1gIuIrujEsE/exec';

var transactions = JSON.parse(localStorage.getItem('rest_transactions') || '[]');
var notas        = JSON.parse(localStorage.getItem('rest_notas')        || '[]');
var pagos        = JSON.parse(localStorage.getItem('rest_pagos')        || '[]');
var syncTimeout  = null;
var currentReport = null;

function save() {
  localStorage.setItem('rest_transactions', JSON.stringify(transactions));
  scheduleSync();
}

function saveProvData() {
  localStorage.setItem('rest_notas', JSON.stringify(notas));
  localStorage.setItem('rest_pagos', JSON.stringify(pagos));
  scheduleSync();
}

window.addEventListener('DOMContentLoaded', function() {
  var today = new Date();
  document.getElementById('currentDate').textContent =
    today.toLocaleDateString('es-MX', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  document.getElementById('fDate').value       = today.toISOString().split('T')[0];
  document.getElementById('filterMonth').value = today.toISOString().slice(0,7);
  document.getElementById('nFecha').value      = today.toISOString().split('T')[0];
  document.getElementById('pFecha').value      = today.toISOString().split('T')[0];

  updateSummary();
  renderRecentTable();
  renderMovTable();
  updateReportInputs();
  populateCategoryFilter();
  populateProvSelects();
  loadFromCloud();
});

function switchTab(e, name) {
  document.querySelectorAll('#mainTabs .tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  e.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'movimientos') renderMovTable();
  if (name === 'proveedores') { populateProvSelects(); renderCuentas(); }
}

function switchSubTab(e, name) {
  document.querySelectorAll('#provTabs .tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.subpanel').forEach(function(p){ p.classList.remove('active'); });
  e.target.classList.add('active');
  document.getElementById('subpanel-' + name).classList.add('active');
  if (name === 'cuentas')  renderCuentas();
  if (name === 'provlist') renderProveedoresList();
  if (name === 'notas' || name === 'pagos') populateProvSelects();
}

function addTransaction() {
  var type     = document.getElementById('fType').value;
  var date     = document.getElementById('fDate').value;
  var category = document.getElementById('fCategory').value;
  var amount   = parseFloat(document.getElementById('fAmount').value);
  var desc     = document.getElementById('fDesc').value.trim();

  if (!date || !category || isNaN(amount) || amount <= 0) {
    alert('Por favor completa Fecha, Categoria y Monto.');
    return;
  }

  transactions.unshift({ id: Date.now(), type: type, date: date, category: category, amount: amount, desc: desc });
  save();
  updateSummary();
  renderRecentTable();
  populateCategoryFilter();
  clearForm();
  alert('Movimiento registrado.');
}

function clearForm() {
  document.getElementById('fCategory').value = '';
  document.getElementById('fAmount').value   = '';
  document.getElementById('fDesc').value     = '';
}

function deleteTransaction(id) {
  if (!confirm('Eliminar este movimiento?')) return;
  transactions = transactions.filter(function(t){ return Number(t.id) !== id; });
  save();
  updateSummary();
  renderRecentTable();
  renderMovTable();
}

function updateSummary() {
  var now   = new Date();
  var month = now.toISOString().slice(0,7);
  var mTx   = transactions.filter(function(t){ return String(t.date).startsWith(month); });
  var inc   = mTx.filter(function(t){ return t.type==='income'; }).reduce(function(s,t){ return s+Number(t.amount); }, 0);
  var exp   = mTx.filter(function(t){ return t.type==='expense'; }).reduce(function(s,t){ return s+Number(t.amount); }, 0);
  var bal   = inc - exp;
  document.getElementById('sumIncome').textContent  = fmt(inc);
  document.getElementById('sumExpense').textContent  = fmt(exp);
  document.getElementById('sumBalance').textContent  = fmt(bal);
  document.getElementById('sumBalance').style.color  = bal >= 0 ? 'var(--green)' : 'var(--red)';
  var ml = now.toLocaleDateString('es-MX', {month:'long', year:'numeric'});
  document.getElementById('sumIncomePeriod').textContent  = ml;
  document.getElementById('sumExpensePeriod').textContent = ml;
}

function fmt(n) {
  return '$' + Math.abs(n).toLocaleString('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function formatDate(d) {
  var p = String(d).split('-');
  return p[2] + '/' + p[1] + '/' + p[0];
}

function renderRecentTable() {
  document.getElementById('recentTable').innerHTML = renderTable(transactions.slice(0,15));
}

function renderMovTable() {
  var month = document.getElementById('filterMonth').value;
  var type  = document.getElementById('filterType').value;
  var cat   = document.getElementById('filterCategory').value;
  var f     = transactions.slice();
  if (month) f = f.filter(function(t){ return String(t.date).startsWith(month); });
  if (type)  f = f.filter(function(t){ return t.type === type; });
  if (cat)   f = f.filter(function(t){ return t.category === cat; });
  document.getElementById('movCount').textContent = f.length + ' registros';
  document.getElementById('movTable').innerHTML   = renderTable(f);
}

function renderTable(data) {
  if (!data || data.length === 0) {
    return '<div class="empty-state"><div class="icon">&#128235;</div><div>No hay movimientos</div></div>';
  }
  var rows = data.map(function(t) {
    return '<tr>' +
      '<td style="font-family:\'DM Mono\',monospace;font-size:0.79rem">' + formatDate(t.date) + '</td>' +
      '<td><span class="badge badge-' + t.type + '">' + (t.type==='income'?'Ingreso':'Egreso') + '</span></td>' +
      '<td>' + t.category + '</td>' +
      '<td style="color:var(--muted);font-size:0.79rem">' + (t.desc||'&mdash;') + '</td>' +
      '<td class="amount-cell amount-' + t.type + '">' + (t.type==='income'?'+':'&minus;') + fmt(t.amount) + '</td>' +
      '<td><button class="btn-danger" onclick="deleteTransaction(' + Number(t.id) + ')">&#10005;</button></td>' +
      '</tr>';
  }).join('');
  return '<table><thead><tr><th>Fecha</th><th>Tipo</th><th>Categoria</th><th>Descripcion</th><th>Monto</th><th></th></tr></thead><tbody>' + rows + '</tbody></table>';
}

function populateCategoryFilter() {
  var sel  = document.getElementById('filterCategory');
  var curr = sel.value;
  var cats = [];
  transactions.forEach(function(t){ if (cats.indexOf(t.category)===-1) cats.push(t.category); });
  cats.sort();
  sel.innerHTML = '<option value="">Todas las categorias</option>' +
    cats.map(function(c){ return '<option value="'+c+'"'+(c===curr?' selected':'')+'>'+c+'</option>'; }).join('');
}

function applyFilters() { renderMovTable(); }
function clearFilters() {
  document.getElementById('filterMonth').value    = new Date().toISOString().slice(0,7);
  document.getElementById('filterType').value     = '';
  document.getElementById('filterCategory').value = '';
  renderMovTable();
}

// --- PROVEEDORES ---
function getProveedores() {
  var p = [];
  notas.forEach(function(n){ if (p.indexOf(n.proveedor)===-1) p.push(n.proveedor); });
  return p.sort();
}

function populateProvSelects() {
  var provs = getProveedores();
  var opts  = '<option value="">-- Selecciona --</option>' + provs.map(function(p){ return '<option value="'+p+'">'+p+'</option>'; }).join('');
  var fOpts = '<option value="">Todos</option>' + provs.map(function(p){ return '<option value="'+p+'">'+p+'</option>'; }).join('');
  var n=document.getElementById('nProv'), pp=document.getElementById('pProv'), fp=document.getElementById('filterProvCuenta');
  if(n)  n.innerHTML  = opts;
  if(pp) pp.innerHTML = opts;
  if(fp) fp.innerHTML = fOpts;
}

function getSaldo(nota) {
  var paid = pagos.filter(function(p){ return Number(p.notaId)===Number(nota.id); }).reduce(function(s,p){ return s+Number(p.monto); }, 0);
  return Number(nota.monto) - paid;
}

function getEstado(nota) {
  var s = getSaldo(nota);
  if (s <= 0) return 'pagado';
  if (s < Number(nota.monto)) return 'parcial';
  return 'pendiente';
}

function renderCuentas() {
  populateProvSelects();
  var fp = document.getElementById('filterProvCuenta') ? document.getElementById('filterProvCuenta').value : '';
  var fe = document.getElementById('filterEstado')     ? document.getElementById('filterEstado').value     : '';
  var f  = notas.slice();
  if (fp) f = f.filter(function(n){ return n.proveedor===fp; });
  if (fe) f = f.filter(function(n){ return getEstado(n)===fe; });

  var provs   = getProveedores().filter(function(p){ return fp===''||p===fp; });
  var totalD  = 0;
  var cards   = provs.map(function(p) {
    var pn   = notas.filter(function(n){ return n.proveedor===p; });
    var deuda = pn.reduce(function(s,n){ return s+Math.max(0,getSaldo(n)); }, 0);
    totalD += deuda;
    return '<div class="prov-summary-card '+(deuda<=0?'al-dia':'')+'">' +
      '<div class="pname">&#127978; '+p+'</div>' +
      '<div class="pdebt">'+fmt(deuda)+'</div>' +
      '<div class="pnotes">'+pn.length+' nota(s) &middot; '+(deuda<=0?'Al dia &#10003;':'Pendiente')+'</div>' +
      '</div>';
  }).join('');

  if (fp==='') {
    cards += '<div class="prov-summary-card" style="border-color:var(--gold)">' +
      '<div class="pname" style="color:var(--gold)">TOTAL DEUDA</div>' +
      '<div class="pdebt" style="color:var(--gold)">'+fmt(totalD)+'</div>' +
      '<div class="pnotes">'+notas.length+' notas registradas</div></div>';
  }

  document.getElementById('resumenDeuda').innerHTML =
    '<div style="font-size:0.69rem;color:var(--muted);font-family:\'DM Mono\',monospace;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px">Resumen por proveedor</div>' +
    '<div class="prov-summary-grid">'+cards+'</div>';
  document.getElementById('cuentasCount').textContent = f.length + ' notas';

  if (f.length===0) {
    document.getElementById('tablaCuentas').innerHTML = '<div class="empty-state"><div class="icon">&#128235;</div><div>No hay notas de credito</div></div>';
    return;
  }

  var ec = { pendiente:'rgba(224,82,82,0.15)', parcial:'rgba(201,168,76,0.15)', pagado:'rgba(76,175,118,0.15)' };
  var tc = { pendiente:'var(--red)', parcial:'var(--gold)', pagado:'var(--green)' };
  var el = { pendiente:'Pendiente', parcial:'Parcial', pagado:'Pagado' };
  var dc = { pendiente:'dot-pendiente', parcial:'dot-parcial', pagado:'dot-pagado' };

  var rows = f.map(function(n) {
    var saldo=getSaldo(n), est=getEstado(n);
    return '<tr>' +
      '<td style="font-family:\'DM Mono\',monospace;font-size:0.77rem">'+formatDate(n.fecha)+'</td>' +
      '<td><strong>'+n.proveedor+'</strong></td>' +
      '<td style="font-family:\'DM Mono\',monospace;font-size:0.77rem;color:var(--muted)">'+(n.folio||'&mdash;')+'</td>' +
      '<td style="font-size:0.81rem">'+(n.concepto||'&mdash;')+'</td>' +
      '<td class="amount-cell">'+fmt(n.monto)+'</td>' +
      '<td class="amount-cell" style="color:'+(saldo>0?'var(--red)':'var(--green)')+'">'+( saldo>0?fmt(saldo):'&#10003; Pagado')+'</td>' +
      '<td><span class="badge" style="background:'+ec[est]+';color:'+tc[est]+'"><span class="status-dot '+dc[est]+'"></span>'+el[est]+'</span></td>' +
      '<td style="font-size:0.73rem;color:var(--muted)">'+(n.vence?formatDate(n.vence):'&mdash;')+'</td>' +
      '<td><button class="btn-danger" onclick="deleteNota('+Number(n.id)+')">&#10005;</button></td>' +
      '</tr>';
  }).join('');

  document.getElementById('tablaCuentas').innerHTML =
    '<table><thead><tr><th>Fecha</th><th>Proveedor</th><th>Folio</th><th>Concepto</th><th>Total</th><th>Saldo</th><th>Estado</th><th>Vence</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function addNota() {
  var pe = document.getElementById('nProv').value;
  var pn = document.getElementById('nProvNuevo').value.trim();
  var proveedor = pn || pe;
  var fecha    = document.getElementById('nFecha').value;
  var folio    = document.getElementById('nFolio').value.trim();
  var monto    = parseFloat(document.getElementById('nMonto').value);
  var vence    = document.getElementById('nVence').value;
  var concepto = document.getElementById('nConcepto').value.trim();

  if (!proveedor||!fecha||isNaN(monto)||monto<=0) { alert('Completa Proveedor, Fecha y Monto.'); return; }

  notas.unshift({ id:Date.now(), proveedor:proveedor, fecha:fecha, folio:folio, monto:monto, vence:vence, concepto:concepto });
  saveProvData(); populateProvSelects();
  ['nProv','nProvNuevo','nFolio','nMonto','nVence','nConcepto'].forEach(function(id){ document.getElementById(id).value=''; });
  alert('Nota de credito registrada.');
  renderCuentas();
}

function loadNotasPendientes() {
  var prov = document.getElementById('pProv').value;
  var sel  = document.getElementById('pNota');
  if (!prov) { sel.innerHTML='<option value="">-- Elige proveedor --</option>'; return; }
  var pend = notas.filter(function(n){ return n.proveedor===prov && getEstado(n)!=='pagado'; });
  if (!pend.length) { sel.innerHTML='<option value="">Sin notas pendientes</option>'; return; }
  sel.innerHTML = '<option value="">-- Selecciona nota --</option>' +
    pend.map(function(n){ return '<option value="'+n.id+'">'+(n.folio||'Nota '+n.id)+' · Saldo: '+fmt(getSaldo(n))+'</option>'; }).join('');
}

function addPago() {
  var nid   = parseInt(document.getElementById('pNota').value);
  var fecha = document.getElementById('pFecha').value;
  var monto = parseFloat(document.getElementById('pMonto').value);
  var ref   = document.getElementById('pRef').value.trim();
  if (!nid||!fecha||isNaN(monto)||monto<=0) { alert('Completa todos los campos.'); return; }
  var nota  = notas.find(function(n){ return Number(n.id)===nid; });
  var saldo = getSaldo(nota);
  if (monto > saldo+0.01) { alert('El monto ('+fmt(monto)+') supera el saldo ('+fmt(saldo)+').'); return; }
  pagos.unshift({ id:Date.now(), notaId:nid, fecha:fecha, monto:monto, ref:ref });
  saveProvData();
  ['pNota','pMonto','pRef'].forEach(function(id){ document.getElementById(id).value=''; });
  alert('Pago de '+fmt(monto)+' registrado para '+nota.proveedor+'.');
  renderCuentas();
}

function deleteNota(id) {
  if (!confirm('Eliminar esta nota y sus pagos?')) return;
  notas = notas.filter(function(n){ return Number(n.id)!==id; });
  pagos = pagos.filter(function(p){ return Number(p.notaId)!==id; });
  saveProvData(); renderCuentas();
}

function renderProveedoresList() {
  var provs = getProveedores();
  var el    = document.getElementById('listaProveedores');
  if (!provs.length) { el.innerHTML='<div class="empty-state"><div class="icon">&#127978;</div><div>No hay proveedores registrados</div></div>'; return; }
  var cards = provs.map(function(p) {
    var pn   = notas.filter(function(n){ return n.proveedor===p; });
    var deuda = pn.reduce(function(s,n){ return s+Math.max(0,getSaldo(n)); }, 0);
    var total = pn.reduce(function(s,n){ return s+Number(n.monto); }, 0);
    var pagadas = pn.filter(function(n){ return getEstado(n)==='pagado'; }).length;
    return '<div class="prov-summary-card '+(deuda<=0?'al-dia':'')+'" style="padding:18px 20px">' +
      '<div class="pname" style="font-size:0.98rem;margin-bottom:10px">&#127978; '+p+'</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.81rem">' +
        '<div><span style="color:var(--muted);font-family:\'DM Mono\',monospace;font-size:0.67rem;text-transform:uppercase">Deuda actual</span><br><strong style="color:'+(deuda>0?'var(--red)':'var(--green)')+'">'+fmt(deuda)+'</strong></div>' +
        '<div><span style="color:var(--muted);font-family:\'DM Mono\',monospace;font-size:0.67rem;text-transform:uppercase">Total comprado</span><br><strong>'+fmt(total)+'</strong></div>' +
        '<div><span style="color:var(--muted);font-family:\'DM Mono\',monospace;font-size:0.67rem;text-transform:uppercase">Notas</span><br><strong>'+pn.length+'</strong></div>' +
        '<div><span style="color:var(--muted);font-family:\'DM Mono\',monospace;font-size:0.67rem;text-transform:uppercase">Pagadas</span><br><strong style="color:var(--green)">'+pagadas+'</strong></div>' +
      '</div></div>';
  }).join('');
  el.innerHTML = '<div style="font-size:0.69rem;color:var(--muted);font-family:\'DM Mono\',monospace;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px">'+provs.length+' proveedores</div><div class="prov-summary-grid">'+cards+'</div>';
}

// --- REPORTES ---
function updateReportInputs() {
  var period = document.getElementById('rPeriod').value;
  var today  = new Date().toISOString().split('T')[0];
  var tm     = today.slice(0,7);
  var ty     = today.slice(0,4);
  var lbl    = function(t){ return '<label style="font-size:0.68rem;color:var(--muted);font-family:\'DM Mono\',monospace;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px">'+t+'</label>'; };
  var html   = '';
  if (period==='weekly')     html='<div>'+lbl('Semana del')+'<input type="date" id="rDate1" value="'+today+'"></div>';
  else if (period==='biweekly') html='<div>'+lbl('Inicio quincena')+'<input type="date" id="rDate1" value="'+today+'"></div>';
  else if (period==='monthly')  html='<div>'+lbl('Mes')+'<input type="month" id="rDate1" value="'+tm+'"></div>';
  else if (period==='quarterly') html='<div>'+lbl('Trimestre')+'<select id="rDate1"><option value="Q1">Q1 (Ene-Mar)</option><option value="Q2">Q2 (Abr-Jun)</option><option value="Q3">Q3 (Jul-Sep)</option><option value="Q4">Q4 (Oct-Dic)</option></select></div><div>'+lbl('Año')+'<input type="number" id="rDate2" value="'+ty+'" min="2000" max="2099" style="width:90px"></div>';
  else if (period==='semiannual') html='<div>'+lbl('Semestre')+'<select id="rDate1"><option value="H1">1er Semestre (Ene-Jun)</option><option value="H2">2do Semestre (Jul-Dic)</option></select></div><div>'+lbl('Año')+'<input type="number" id="rDate2" value="'+ty+'" min="2000" max="2099" style="width:90px"></div>';
  else html='<div>'+lbl('Año')+'<input type="number" id="rDate1" value="'+ty+'" min="2000" max="2099" style="width:90px"></div>';
  document.getElementById('reportDateInputs').innerHTML = html;
}

function getDateRange() {
  var period=document.getElementById('rPeriod').value;
  var d1=document.getElementById('rDate1')?document.getElementById('rDate1').value:'';
  var d2=document.getElementById('rDate2')?document.getElementById('rDate2').value:'';
  var start,end,label;
  if (period==='weekly') {
    var b=new Date(d1+'T00:00:00'),day=b.getDay(),mon=new Date(b);
    mon.setDate(b.getDate()-(day===0?6:day-1));
    var sun=new Date(mon); sun.setDate(mon.getDate()+6);
    start=mon.toISOString().split('T')[0]; end=sun.toISOString().split('T')[0];
    label='Semana del '+formatDate(start)+' al '+formatDate(end);
  } else if (period==='biweekly') {
    var b2=new Date(d1+'T00:00:00'); start=d1;
    var fin=new Date(b2); fin.setDate(b2.getDate()+13); end=fin.toISOString().split('T')[0];
    label='Quincena del '+formatDate(start)+' al '+formatDate(end);
  } else if (period==='monthly') {
    var pp=d1.split('-'),y=pp[0],m=pp[1]; start=y+'-'+m+'-01';
    var ld=new Date(parseInt(y),parseInt(m),0).getDate(); end=y+'-'+m+'-'+String(ld).padStart(2,'0');
    var mn=new Date(parseInt(y),parseInt(m)-1,1).toLocaleDateString('es-MX',{month:'long',year:'numeric'});
    label='Mes de '+mn.charAt(0).toUpperCase()+mn.slice(1);
  } else if (period==='quarterly') {
    var rng={Q1:['01','03'],Q2:['04','06'],Q3:['07','09'],Q4:['10','12']};
    var ql={Q1:'Primer',Q2:'Segundo',Q3:'Tercer',Q4:'Cuarto'};
    start=d2+'-'+rng[d1][0]+'-01'; end=d2+'-'+rng[d1][1]+'-'+new Date(parseInt(d2),parseInt(rng[d1][1]),0).getDate();
    label=ql[d1]+' Trimestre '+d2;
  } else if (period==='semiannual') {
    start=d1==='H1'?d2+'-01-01':d2+'-07-01'; end=d1==='H1'?d2+'-06-30':d2+'-12-31';
    label=(d1==='H1'?'Primer':'Segundo')+' Semestre '+d2;
  } else {
    start=d1+'-01-01'; end=d1+'-12-31'; label='Año '+d1;
  }
  return {start:start,end:end,label:label};
}

function generateReport() {
  var r=getDateRange();
  var f=transactions.filter(function(t){ return t.date>=r.start&&t.date<=r.end; });
  var inc=f.filter(function(t){ return t.type==='income'; });
  var exp=f.filter(function(t){ return t.type==='expense'; });
  var ti=inc.reduce(function(s,t){ return s+Number(t.amount); },0);
  var te=exp.reduce(function(s,t){ return s+Number(t.amount); },0);
  var bal=ti-te;
  var ic=groupBy(inc,'category'), ec=groupBy(exp,'category');
  currentReport={label:r.label,start:r.start,end:r.end,filtered:f,totalIncome:ti,totalExpense:te,balance:bal};

  document.getElementById('reportResult').innerHTML=
    '<div class="report-result">'+
    '<div class="report-title">'+r.label+'</div>'+
    '<div class="report-subtitle">'+formatDate(r.start)+' &mdash; '+formatDate(r.end)+' &middot; '+f.length+' movimientos</div>'+
    '<div class="report-totals">'+
      '<div class="report-total-card"><label>Total Ingresos</label><div class="val" style="color:var(--green)">'+fmt(ti)+'</div></div>'+
      '<div class="report-total-card"><label>Total Egresos</label><div class="val" style="color:var(--red)">'+fmt(te)+'</div></div>'+
      '<div class="report-total-card"><label>Balance Neto</label><div class="val" style="color:'+(bal>=0?'var(--green)':'var(--red)')+'">'+( bal>=0?'+':'&minus;')+fmt(bal)+'</div></div>'+
    '</div>'+
    '<hr class="divider">'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:22px">'+
      '<div class="category-breakdown"><h4>Ingresos por Categoria</h4>'+renderCatBreakdown(ic,ti,'var(--green)')+'</div>'+
      '<div class="category-breakdown"><h4>Egresos por Categoria</h4>'+renderCatBreakdown(ec,te,'var(--red)')+'</div>'+
    '</div>'+
    '<hr class="divider">'+
    '<div class="category-breakdown"><h4>Detalle de Movimientos</h4>'+renderTable(f)+'</div>'+
    '</div>';
}

function groupBy(arr,key) {
  return arr.reduce(function(acc,t){ acc[t[key]]=(acc[t[key]]||0)+Number(t.amount); return acc; },{});
}

function renderCatBreakdown(cats,total,color) {
  var entries=Object.entries(cats).sort(function(a,b){ return b[1]-a[1]; });
  if (!entries.length) return '<div style="color:var(--muted);font-size:0.83rem;padding:8px 0">Sin movimientos</div>';
  return entries.map(function(e) {
    var pct=total>0?(e[1]/total*100).toFixed(1):0;
    return '<div class="cat-row"><span style="min-width:120px;font-size:0.81rem">'+e[0]+'</span>'+
      '<div class="cat-bar-wrap"><div class="cat-bar" style="width:'+pct+'%;background:'+color+'"></div></div>'+
      '<span style="font-family:\'DM Mono\',monospace;font-size:0.79rem;min-width:80px;text-align:right">'+fmt(e[1])+'</span>'+
      '<span style="color:var(--muted);font-size:0.71rem;min-width:40px;text-align:right">'+pct+'%</span></div>';
  }).join('');
}

function exportReport() {
  if (!currentReport) { alert('Primero genera un reporte.'); return; }
  var csv='Fecha,Tipo,Categoria,Descripcion,Monto\n';
  currentReport.filtered.forEach(function(t){ csv+=t.date+','+(t.type==='income'?'Ingreso':'Egreso')+',"'+t.category+'",'+(t.desc||'')+','+t.amount+'\n'; });
  csv+='\nTotal Ingresos,,,,'+currentReport.totalIncome+'\nTotal Egresos,,,,'+currentReport.totalExpense+'\nBalance Neto,,,,'+currentReport.balance+'\n';
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download='Reporte_'+currentReport.label.replace(/\s/g,'_')+'.csv'; a.click();
}

// --- SYNC ---
function setSyncStatus(s) {
  var dot=document.getElementById('syncDot'), txt=document.getElementById('syncText');
  if(!dot||!txt) return;
  var c={syncing:'var(--gold)',ok:'var(--green)',error:'var(--red)',idle:'var(--muted)'};
  var t={syncing:'Sincronizando...',ok:'Sincronizado',error:'Sin conexion',idle:'En espera'};
  dot.style.background=c[s]||c.idle; txt.textContent=t[s]||t.idle;
}

function scheduleSync() {
  clearTimeout(syncTimeout);
  syncTimeout=setTimeout(syncNow,2000);
}

function syncNow() {
  setSyncStatus('syncing');
  fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'sync',transactions:transactions,notas:notas,pagos:pagos})})
  .then(function(r){ return r.json(); })
  .then(function(d){ if(d.success){ setSyncStatus('ok'); setTimeout(function(){ setSyncStatus('idle'); },4000); } else { setSyncStatus('error'); } })
  .catch(function(){ setSyncStatus('error'); });
}

function loadFromCloud() {
  setSyncStatus('syncing');
  fetch(SCRIPT_URL+'?action=load')
  .then(function(r){ return r.json(); })
  .then(function(d) {
    if (!d.success) { setSyncStatus('error'); return; }
    if (d.transactions&&d.transactions.length) {
      transactions=d.transactions.map(function(t){ return {id:Number(t.id),type:t.type,date:t.date,category:t.category,amount:Number(t.amount),desc:t.desc||''}; });
      localStorage.setItem('rest_transactions',JSON.stringify(transactions));
    }
    if (d.notas&&d.notas.length) {
      notas=d.notas.map(function(n){ return {id:Number(n.id),proveedor:n.proveedor,fecha:n.fecha,folio:n.folio||'',monto:Number(n.monto),vence:n.vence||'',concepto:n.concepto||''}; });
      localStorage.setItem('rest_notas',JSON.stringify(notas));
    }
    if (d.pagos&&d.pagos.length) {
      pagos=d.pagos.map(function(p){ return {id:Number(p.id),notaId:Number(p.notaId),fecha:p.fecha,monto:Number(p.monto),ref:p.ref||''}; });
      localStorage.setItem('rest_pagos',JSON.stringify(pagos));
    }
    updateSummary(); renderRecentTable(); renderMovTable();
    populateCategoryFilter(); populateProvSelects();
    setSyncStatus('ok'); setTimeout(function(){ setSyncStatus('idle'); },4000);
  })
  .catch(function(){ setSyncStatus('error'); });
}
</script>
